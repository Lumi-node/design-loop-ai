<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design to HTML</title>
<style>* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

.container {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
}

.header {
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: rgb(93, 88, 90);
    color: #ffffff;
    height: 80.0vh;
    width: 100vw;
    padding: 10px;
}

.main {
    display: flex;
    flex-direction: row;
    flex: 1;
    width: 100vw;
}

.sidebar {
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: rgb(57, 53, 56);
    color: #ffffff;
    width: 30.0vw;
    height: 100%;
    padding: 10px;
}

.content {
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: rgb(104, 105, 100);
    color: #ffffff;
    flex: 1;
    height: 100%;
    padding: 10px;
}

.footer {
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: rgb(85, 91, 86);
    color: #ffffff;
    height: 10.0vh;
    width: 100vw;
    padding: 10px;
}</style></head>
<body>
    <div class="container">
        <div class="header"></div>
        <div class="main">
            <div class="sidebar"></div>
            <div class="content"></div>
        </div>
        <div class="footer"></div>
    </div>
</body>
</html>
